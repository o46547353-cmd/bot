version: '3.8'

services:
  slash_vpn_bot:
    build: .
    restart: always
    env_file: .env
    # BUG-14/15 FIX: порт 8000 удалён — бот не запускает web-сервер
    volumes:
      - ./images:/app/images
      - ./logs:/app/logs
      # БД монтируем как директорию чтобы избежать ошибки "is a directory" при первом запуске
      - bot_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DB_FILE=/app/data/slash_vpn_bot.db

volumes:
  bot_data:
